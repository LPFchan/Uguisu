# Build firmware and create a GitHub release when a version tag (v*) is pushed.
# Requires repo secret RELEASE_TOKEN: a Personal Access Token (classic) with "repo" scope.
# Create at: GitHub → Settings → Developer settings → PATs. Add under repo Settings → Secrets → Actions.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build firmware
        working-directory: firmware/uguisu
        run: pio run

      - name: Create release and upload firmware
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware/uguisu/.pio/build/seeed_xiao_nrf52840_bluefruit/firmware.hex
            firmware/uguisu/.pio/build/seeed_xiao_nrf52840_bluefruit/firmware.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
